name: Auto Archive Repo

on:
  schedule:
    - cron: '0 17 22 4 *' # 22 April 17:00 UTC = 23 April 00:00 WIB
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Archive repo
        run: |
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }} \
            -d '{"archived": true}'
