name: Terminal Repo

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Terminal
        run: git remote add upstream https://github.com/hushenghao/AndroidEasterEggs.git

      - name: Term
        run: git fetch upstream

      - name: Term
        run: git pull upstream main --no-rebase
