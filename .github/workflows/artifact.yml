name: Build APK Artifact

on:
  push:
    paths:
      - 'app/**'
      - 'eggs/**'
      - 'basic/**'
      - 'feature/**'
      - 'core/**'
      - 'jvm-basic/**'
      - 'build-logic/**'
      - 'gradle/**'
      - '*.kts'
      - 'gradle.properties'
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v6

      # Setup JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle
        
      # Setup Ruby
      - name: Set up Ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      # Disable frozen mode before bundle install
      - name: Disable frozen mode
        run: bundle config set frozen false

      # Install Fastlane & plugins
      - name: Install Fastlane & plugins
        run: |
          bundle config set path vendor/bundle
          bundle install
          bundle exec fastlane install_plugins

      # Decode keystore and key.properties
      - name: Decode secrets to files
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES_BASE64: ${{ secrets.KEY_PROPERTIES_BASE64 }}
        run: |
          echo "$KEY_PROPERTIES_BASE64" | base64 --decode > key.properties
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          ls -l
          
      # Build APK
      - name: Build APK
        run: |
          bundle exec fastlane realease

      # Upload APK as artifact
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/fossProduct/release/*.apk
          retention-days: 7
